<!DOCTYPE html>
<html lang="en" data-mode="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Skies Weather</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Skies">
<meta name="theme-color" id="themeColor" content="#0a0a0f">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="scene">
  <div id="stars"></div>
  <div id="sun"></div>
  <div id="moon"></div>
  <canvas id="rain-canvas"></canvas>
  <canvas id="snow-canvas"></canvas>
  <div id="lightning"></div>
  <div class="fog" id="f1" style="top:28%"></div>
  <div class="fog" id="f2" style="top:48%"></div>
  <div class="fog" id="f3" style="top:66%"></div>
  <div id="light-overlay"></div>
</div>

<div id="app">
  <div id="deck"></div>
  <div id="bnav">
    <span class="nv" id="locBtn">📍</span>
    <div class="dots" id="dots"></div>
    <span class="nv" id="listBtn">☰</span>
  </div>
</div>

<div id="lv">
  <div class="lv-top"><h1>Weather</h1><button class="lv-done" id="lvDone">Done</button></div>
  <div class="lv-ctrl">
    <div class="useg"><button id="gC" class="active">°C</button><button id="gF">°F</button></div>
    <div style="display:flex;gap:12px;align-items:center">
      <button class="edbtn" id="themeBtn">🌙 Dark</button>
      <button class="edbtn" id="edBtn">Edit</button>
    </div>
  </div>
  <div class="lv-sw"><input class="lv-si" id="si" placeholder="Search city or airport…" type="search" autocomplete="off"></div>
  <div class="sres" id="sres"></div>
  <div class="plist" id="plist"></div>
</div>

<script src="app.js"></script>
</body>
</html>
