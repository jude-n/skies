<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Skies Weather</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Skies">
<meta name="theme-color" content="#1a2744">
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: #000; }
body { font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif; color: #fff; }

/* ── App shell ── */
#app { width: 100%; height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

/* ── Slide deck ── */
#deck {
  flex: 1; display: flex; transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
  will-change: transform; overflow: hidden;
}
.slide {
  min-width: 100vw; height: 100%; overflow-y: auto; overflow-x: hidden;
  scroll-behavior: smooth; position: relative;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.slide::-webkit-scrollbar { display: none; }

/* ── Dynamic background ── */
.bg {
  position: fixed; inset: 0; z-index: 0;
  transition: background 1.2s ease;
}
.slide-content { position: relative; z-index: 1; min-height: 100%; padding-bottom: 120px; }

/* ── Status & location bar ── */
.topbar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 56px 20px 0;
}
.topbar-icon { font-size: 20px; cursor: pointer; padding: 8px; opacity: 0.9; }

/* ── Hero temp block ── */
.hero { padding: 0 20px; margin-top: 2px; }
.city-name { font-size: 34px; font-weight: 400; letter-spacing: -0.5px; text-shadow: 0 1px 8px rgba(0,0,0,0.3); }
.my-location-label { font-size: 16px; opacity: 0.8; margin-top: 2px; }
.temp-hero { font-size: 96px; font-weight: 200; letter-spacing: -4px; line-height: 1; margin-top: 0px; text-shadow: 0 2px 20px rgba(0,0,0,0.2); }
.condition-hero { font-size: 20px; font-weight: 400; opacity: 0.9; margin-top: 2px; }
.hi-lo { font-size: 20px; font-weight: 400; opacity: 0.9; margin-top: 2px; }

/* ── Dual temp badge ── */
.dual-badge {
  display: inline-flex; gap: 0; margin-top: 10px;
  background: rgba(255,255,255,0.18); border-radius: 20px;
  overflow: hidden; backdrop-filter: blur(10px);
}
.dual-badge .tb {
  padding: 5px 14px; font-size: 14px; font-weight: 500; cursor: pointer;
  transition: background 0.2s; border-radius: 20px;
}
.dual-badge .tb.active { background: rgba(255,255,255,0.35); }

/* ── Cards ── */
.card {
  margin: 12px 16px 0;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-radius: 16px;
  border: 0.5px solid rgba(255,255,255,0.25);
  overflow: hidden;
}
.card-header { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.7; padding: 10px 16px 4px; display: flex; align-items: center; gap: 6px; }

/* ── Hourly strip ── */
.hourly-scroll { overflow-x: auto; scrollbar-width: none; padding: 4px 0 12px; }
.hourly-scroll::-webkit-scrollbar { display: none; }
.hourly-row { display: flex; gap: 0; padding: 0 8px; }
.hcell { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 8px 12px; min-width: 60px; }
.hcell.now-cell { background: rgba(255,255,255,0.12); border-radius: 12px; }
.hcell .ht { font-size: 13px; opacity: 0.7; }
.hcell .hi { font-size: 24px; }
.hcell .htemp { font-size: 17px; font-weight: 500; }

/* ── 10-day ── */
.daily-row { display: flex; align-items: center; padding: 11px 16px; border-top: 0.5px solid rgba(255,255,255,0.15); }
.daily-row:first-child { border-top: none; }
.dr-day { font-size: 17px; font-weight: 500; min-width: 44px; }
.dr-icon { font-size: 24px; margin: 0 8px; }
.dr-bar-wrap { flex: 1; display: flex; align-items: center; gap: 6px; }
.dr-lo { font-size: 15px; opacity: 0.6; min-width: 28px; text-align: right; }
.dr-bar-outer { flex: 1; height: 4px; background: rgba(255,255,255,0.2); border-radius: 4px; overflow: hidden; }
.dr-bar-inner { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #3dd6f5, #f5a623); }
.dr-hi { font-size: 15px; min-width: 28px; }

/* ── Stat grid ── */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: rgba(255,255,255,0.1); }
.stat-cell { padding: 14px 16px; background: transparent; }
.stat-cell-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.65; margin-bottom: 4px; display: flex; align-items: center; gap: 5px; }
.stat-cell-val { font-size: 28px; font-weight: 300; }
.stat-cell-sub { font-size: 13px; opacity: 0.7; margin-top: 2px; }

/* ── Precip card ── */
.precip-bar-wrap { padding: 8px 16px 14px; }
.precip-hours { display: flex; gap: 3px; align-items: flex-end; height: 48px; }
.pbar { flex: 1; background: rgba(150,210,255,0.7); border-radius: 3px 3px 0 0; min-height: 3px; transition: height 0.4s; }

/* ── Bottom dot nav ── */
#bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: rgba(0,0,0,0.55); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 0.5px solid rgba(255,255,255,0.15);
  padding: 12px 20px 28px;
  display: flex; align-items: center;
}
.dots { display: flex; gap: 7px; justify-content: center; flex: 1; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.4); cursor: pointer; transition: background 0.2s, transform 0.2s; }
.dot.active { background: #fff; transform: scale(1.25); }
.dot.my-loc { background: rgba(255,255,255,0.4); position: relative; }
.dot.my-loc::before { content:''; position:absolute; inset:1px; border-radius:50%; border:1px solid rgba(255,255,255,0.7); }
.nav-icon { font-size: 22px; cursor: pointer; padding: 4px; opacity: 0.85; }

/* ── List view overlay ── */
#list-view {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(20,20,35,0.97);
  backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
  display: none; flex-direction: column;
  overflow: hidden;
}
#list-view.open { display: flex; }
.list-topbar { display: flex; align-items: center; justify-content: space-between; padding: 56px 20px 12px; }
.list-topbar h1 { font-size: 32px; font-weight: 600; }
.list-search-wrap { padding: 0 16px 12px; }
.list-search {
  width: 100%; background: rgba(255,255,255,0.12); border: none; border-radius: 12px;
  padding: 11px 16px; font-size: 16px; color: #fff; outline: none;
  font-family: inherit;
}
.list-search::placeholder { color: rgba(255,255,255,0.45); }
.list-search-results { background: rgba(255,255,255,0.1); border-radius: 12px; margin: 0 16px 12px; overflow: hidden; max-height: 260px; overflow-y: auto; }
.search-result-item { padding: 13px 16px; font-size: 16px; cursor: pointer; border-bottom: 0.5px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: space-between; }
.search-result-item:last-child { border-bottom: none; }
.search-result-item:hover { background: rgba(255,255,255,0.08); }
.sri-name { font-weight: 500; }
.sri-region { font-size: 13px; opacity: 0.6; margin-top: 1px; }
.places-list { flex: 1; overflow-y: auto; padding: 0 16px; }
.place-card {
  background: linear-gradient(135deg, var(--gc1, #1a6085), var(--gc2, #0d3d5e));
  border-radius: 16px; padding: 16px 20px; margin-bottom: 12px;
  cursor: pointer; display: flex; justify-content: space-between; align-items: flex-start;
  position: relative; overflow: hidden;
}
.place-card-left .pc-city { font-size: 22px; font-weight: 500; }
.place-card-left .pc-region { font-size: 14px; opacity: 0.75; margin-top: 2px; }
.place-card-left .pc-cond { font-size: 14px; opacity: 0.8; margin-top: 10px; }
.place-card-right { text-align: right; }
.place-card-right .pc-temp { font-size: 48px; font-weight: 200; line-height: 1; }
.place-card-right .pc-hilow { font-size: 13px; opacity: 0.7; margin-top: 4px; }
.pc-del { position: absolute; top: 12px; right: 12px; background: rgba(255,59,48,0.85); border-radius: 50%; width: 26px; height: 26px; display: none; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; z-index: 10; }
.place-card.editing .pc-del { display: flex; }
.place-card.editing .place-card-right .pc-temp { opacity: 0.5; }
.list-done { background: rgba(255,255,255,0.15); border: none; border-radius: 10px; padding: 8px 20px; font-size: 16px; color: #fff; cursor: pointer; font-family: inherit; }
.unit-toggle { display: flex; gap: 0; background: rgba(255,255,255,0.12); border-radius: 8px; overflow: hidden; }
.unit-toggle button { background: none; border: none; color: rgba(255,255,255,0.5); font-size: 15px; font-weight: 600; padding: 6px 14px; cursor: pointer; font-family: inherit; transition: all 0.2s; }
.unit-toggle button.active { background: rgba(255,255,255,0.25); color: #fff; border-radius: 8px; }
.list-controls { display: flex; align-items: center; justify-content: space-between; padding: 8px 20px 8px; }
.edit-btn { background: none; border: none; color: rgba(255,255,255,0.65); font-size: 15px; cursor: pointer; font-family: inherit; }

/* ── Search spinner ── */
.spin { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Fade in ── */
@keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:none; } }
.fade-in { animation: fadeUp 0.5s ease both; }

/* ── Loading state ── */
.loading-center { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; opacity: 0.7; }

/* ── Precipitation chance strip ── */
.pop-row { display: flex; align-items: center; gap: 4px; padding: 2px 16px 10px; flex-wrap: wrap; }
.pop-pill { font-size: 12px; padding: 2px 8px; background: rgba(100,180,255,0.25); border-radius: 10px; }
</style>
</head>
<body>
<div id="app">
  <div id="deck"></div>

  <div id="bottom-nav">
    <span class="nav-icon" id="mapBtn">📡</span>
    <div class="dots" id="dots"></div>
    <span class="nav-icon" id="listBtn">☰</span>
  </div>
</div>

<!-- List / places view -->
<div id="list-view">
  <div class="list-topbar">
    <h1>Weather</h1>
    <button class="list-done" id="listDone">Done</button>
  </div>
  <div class="list-controls">
    <div class="unit-toggle">
      <button id="globalC" class="active">°C</button>
      <button id="globalF">°F</button>
    </div>
    <button class="edit-btn" id="editBtn">Edit</button>
  </div>
  <div class="list-search-wrap">
    <input class="list-search" id="listSearch" placeholder="Search for a city or airport" type="search" autocomplete="off" />
  </div>
  <div class="list-search-results" id="searchResults" style="display:none"></div>
  <div class="places-list" id="placesList"></div>
</div>

<script>
/* ═══════════════════════════════════════════════
   CONFIG & STATE
═══════════════════════════════════════════════ */
const DEFAULT_PLACES = [
  { id: 'charleston-il', name: 'Charleston', region: 'Illinois', country: 'US', lat: 39.4942, lon: -88.1761, isDefault: true }
];

const BG_THEMES = {
  sunny_day:    { g1:'#1a6db5', g2:'#5aacf0', g3:'#9dd4f5' },
  sunny_evening:{ g1:'#c0392b', g2:'#e67e22', g3:'#f39c12' },
  cloudy:       { g1:'#536976', g2:'#292e49', g3:'#4a5568' },
  rainy:        { g1:'#1a1a2e', g2:'#16213e', g3:'#0f3460' },
  snowy:        { g1:'#74b9d8', g2:'#a8c8e8', g3:'#c8dff0' },
  night:        { g1:'#0a0a1a', g2:'#1a1a3e', g3:'#0d1b4b' },
  thunder:      { g1:'#1a1a2e', g2:'#16213e', g3:'#2d1b4b' },
  foggy:        { g1:'#636e72', g2:'#b2bec3', g3:'#dfe6e9' },
};

const PLACE_GRADIENTS = [
  ['#1a6085','#0d3d5e'],['#1e3a5f','#0d2137'],['#2d5a8e','#1a3a5c'],
  ['#1a5276','#154360'],['#0e6655','#0b5345'],['#6e2f8c','#4a1f60'],
  ['#873600','#5a2400'],['#2874a6','#1a4f7a'],
];

let places = JSON.parse(localStorage.getItem('wx_places') || 'null') || DEFAULT_PLACES;
let weatherCache = JSON.parse(localStorage.getItem('wx_cache') || '{}');
let currentIdx = 0;
let globalUnit = localStorage.getItem('wx_unit') || 'C';
let editing = false;
let touchStartX = 0, touchStartY = 0, isDragging = false, dragDelta = 0;

/* ═══════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════ */
const cToF = c => Math.round(c * 9/5 + 32);
const fmt = (c, u) => u === 'F' ? cToF(c) : Math.round(c);
const fmtU = u => u === 'F' ? '°F' : '°C';

const WMO = {
  0:{l:'Clear Sky',i:'☀️',bg:'sunny_day'},1:{l:'Mainly Clear',i:'🌤',bg:'sunny_day'},
  2:{l:'Partly Cloudy',i:'⛅',bg:'cloudy'},3:{l:'Overcast',i:'☁️',bg:'cloudy'},
  45:{l:'Foggy',i:'🌫',bg:'foggy'},48:{l:'Icy Fog',i:'🌫',bg:'foggy'},
  51:{l:'Light Drizzle',i:'🌦',bg:'rainy'},53:{l:'Drizzle',i:'🌦',bg:'rainy'},
  55:{l:'Heavy Drizzle',i:'🌧',bg:'rainy'},
  61:{l:'Light Rain',i:'🌧',bg:'rainy'},63:{l:'Rain',i:'🌧',bg:'rainy'},65:{l:'Heavy Rain',i:'🌧',bg:'rainy'},
  71:{l:'Light Snow',i:'🌨',bg:'snowy'},73:{l:'Snow',i:'❄️',bg:'snowy'},75:{l:'Heavy Snow',i:'❄️',bg:'snowy'},
  77:{l:'Snow Grains',i:'🌨',bg:'snowy'},
  80:{l:'Showers',i:'🌦',bg:'rainy'},81:{l:'Rain Showers',i:'🌧',bg:'rainy'},82:{l:'Violent Showers',i:'⛈',bg:'thunder'},
  85:{l:'Snow Showers',i:'🌨',bg:'snowy'},86:{l:'Heavy Snow Showers',i:'❄️',bg:'snowy'},
  95:{l:'Thunderstorm',i:'⛈',bg:'thunder'},96:{l:'Thunderstorm',i:'⛈',bg:'thunder'},99:{l:'Thunderstorm',i:'⛈',bg:'thunder'},
};
const getWmo = code => WMO[code] || {l:'Unknown',i:'🌡',bg:'cloudy'};

function getBgForCode(code, hour) {
  const w = getWmo(code);
  const theme = w.bg;
  if (theme === 'sunny_day' && (hour < 6 || hour >= 20)) return 'night';
  if (theme === 'sunny_day' && (hour >= 17)) return 'sunny_evening';
  return theme;
}

function applyBg(code, hour) {
  let bg = document.getElementById('mainBg');
  if (!bg) {
    bg = document.createElement('div');
    bg.id = 'mainBg';
    bg.className = 'bg';
    document.body.insertBefore(bg, document.body.firstChild);
  }
  const theme = BG_THEMES[getBgForCode(code, hour)] || BG_THEMES.cloudy;
  bg.style.background = `linear-gradient(175deg, ${theme.g1} 0%, ${theme.g2} 55%, ${theme.g3} 100%)`;
}

const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function dayName(str, i) {
  if (i === 0) return 'Today';
  const d = new Date(str + 'T12:00:00');
  return DAYS[d.getDay()];
}
function hourLabel(isoStr) {
  const h = new Date(isoStr).getHours();
  if (h === 0) return '12AM';
  if (h === 12) return '12PM';
  return h > 12 ? (h-12)+'PM' : h+'AM';
}
function nowHour() { return new Date().getHours(); }

/* ═══════════════════════════════════════════════
   API
═══════════════════════════════════════════════ */
async function fetchWeather(lat, lon) {
  const key = `${lat.toFixed(3)}_${lon.toFixed(3)}`;
  const cached = weatherCache[key];
  if (cached && Date.now() - cached.ts < 10 * 60 * 1000) return cached.data;

  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
    + `&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m,wind_direction_10m,surface_pressure,visibility`
    + `&hourly=temperature_2m,weather_code,precipitation_probability`
    + `&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,uv_index_max`
    + `&timezone=auto&forecast_days=10`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('API fail');
  const data = await res.json();
  weatherCache[key] = { ts: Date.now(), data };
  try { localStorage.setItem('wx_cache', JSON.stringify(weatherCache)); } catch(e) {}
  return data;
}

async function geocodeSearch(q) {
  const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=8&language=en`);
  const d = await res.json();
  return d.results || [];
}

/* ═══════════════════════════════════════════════
   RENDER SLIDE
═══════════════════════════════════════════════ */
function buildSlide(place, data) {
  const c = data.current;
  const wmo = getWmo(c.weather_code);
  const h = nowHour();
  const u = globalUnit;
  const tempNow = fmt(c.temperature_2m, u);

  // Find today hi/lo
  const todayHi = fmt(data.daily.temperature_2m_max[0], u);
  const todayLo = fmt(data.daily.temperature_2m_min[0], u);

  // Hourly — next 24h
  const hourlyStart = (() => {
    const now = new Date();
    return data.hourly.time.findIndex(t => new Date(t) >= now);
  })();
  const hourlySlice = data.hourly.time.slice(hourlyStart, hourlyStart + 24);
  const hourlyTemps = data.hourly.temperature_2m.slice(hourlyStart, hourlyStart + 24);
  const hourlyCodes = data.hourly.weather_code.slice(hourlyStart, hourlyStart + 24);
  const hourlyPop = data.hourly.precipitation_probability.slice(hourlyStart, hourlyStart + 24);

  const hasRain = hourlyPop.some(p => p > 20);
  const precipSummary = hasRain
    ? `Rain expected in ${hourlyPop.findIndex(p => p > 30) + 1}h`
    : 'No precipitation in the next 24h';

  const hourlyHTML = hourlySlice.map((t, i) => {
    const pop = hourlyPop[i];
    const wh = getWmo(hourlyCodes[i]);
    return `<div class="hcell${i===0?' now-cell':''}">
      <div class="ht">${i===0?'Now':hourLabel(t)}</div>
      ${pop > 20 ? `<div class="ht" style="color:#7ec8f5;font-size:12px">${pop}%</div>` : '<div class="ht" style="opacity:0"> </div>'}
      <div class="hi">${wh.i}</div>
      <div class="htemp">${fmt(hourlyTemps[i],u)}°</div>
    </div>`;
  }).join('');

  // Daily 10-day
  const allHi = data.daily.temperature_2m_max;
  const allLo = data.daily.temperature_2m_min;
  const absMax = Math.max(...allHi);
  const absMin = Math.min(...allLo);
  const dailyHTML = data.daily.time.map((t, i) => {
    const wh = getWmo(data.daily.weather_code[i]);
    const hi = fmt(allHi[i], u);
    const lo = fmt(allLo[i], u);
    const hiRaw = allHi[i], loRaw = allLo[i];
    const barLeft = ((loRaw - absMin) / (absMax - absMin)) * 100;
    const barWidth = ((hiRaw - loRaw) / (absMax - absMin)) * 100;
    return `<div class="daily-row">
      <div class="dr-day">${dayName(t, i)}</div>
      <div class="dr-icon">${wh.i}</div>
      <div class="dr-bar-wrap">
        <div class="dr-lo">${lo}°</div>
        <div class="dr-bar-outer">
          <div class="dr-bar-inner" style="margin-left:${barLeft.toFixed(1)}%;width:${Math.max(barWidth,8).toFixed(1)}%"></div>
        </div>
        <div class="dr-hi">${hi}°</div>
      </div>
    </div>`;
  }).join('');

  // UV index label
  const uv = data.daily.uv_index_max?.[0] ?? 0;
  const uvLabel = uv <= 2 ? 'Low' : uv <= 5 ? 'Moderate' : uv <= 7 ? 'High' : uv <= 10 ? 'Very High' : 'Extreme';

  // Wind direction
  const windDeg = c.wind_direction_10m;
  const dirs = ['N','NE','E','SE','S','SW','W','NW'];
  const windDir = dirs[Math.round(windDeg / 45) % 8];

  // Feels like sentence
  const feelsLike = fmt(c.apparent_temperature, u);
  const feelsDesc = feelsLike < tempNow - 3 ? 'Wind is making it feel colder.' : feelsLike > tempNow + 3 ? 'Humidity is making it feel warmer.' : 'Similar to the actual temperature.';

  // Precip bar (hourly, next 12h)
  const precipBars = data.hourly.precipitation_probability.slice(hourlyStart, hourlyStart+12)
    .map(p => `<div class="pbar" style="height:${Math.max(4, p*0.46).toFixed(0)}px;opacity:${0.4 + p/200}"></div>`).join('');

  applyBg(c.weather_code, h);

  return `<div class="slide-content fade-in">
    <div class="topbar">
      <span></span>
      <span></span>
    </div>
    <div class="hero">
      <div class="city-name">${place.name}</div>
      ${place.isDefault ? '<div class="my-location-label">Default Location</div>' : `<div class="my-location-label">${place.region || ''}</div>`}
      <div class="temp-hero">${tempNow}°</div>
      <div class="condition-hero">${wmo.l}</div>
      <div class="hi-lo">H:${todayHi}°  L:${todayLo}°</div>
      <div class="dual-badge">
        <div class="tb${u==='C'?' active':''}" data-u="C">${Math.round(c.temperature_2m)}°C</div>
        <div class="tb${u==='F'?' active':''}" data-u="F">${cToF(c.temperature_2m)}°F</div>
      </div>
    </div>

    <!-- Hourly -->
    <div class="card" style="margin-top:16px">
      <div class="card-header">🕐 Hourly forecast — ${precipSummary}</div>
      <div class="hourly-scroll"><div class="hourly-row">${hourlyHTML}</div></div>
    </div>

    <!-- 10-day -->
    <div class="card">
      <div class="card-header">📅 10-day forecast</div>
      ${dailyHTML}
    </div>

    <!-- Stat grid -->
    <div class="card">
      <div class="stat-grid">
        <div class="stat-cell">
          <div class="stat-cell-label">💧 Humidity</div>
          <div class="stat-cell-val">${c.relative_humidity_2m}%</div>
          <div class="stat-cell-sub">${c.relative_humidity_2m > 70 ? 'Feels muggy' : c.relative_humidity_2m < 30 ? 'Very dry' : 'Comfortable'}</div>
        </div>
        <div class="stat-cell">
          <div class="stat-cell-label">💨 Wind</div>
          <div class="stat-cell-val">${Math.round(c.wind_speed_10m)}</div>
          <div class="stat-cell-sub">km/h ${windDir}</div>
        </div>
        <div class="stat-cell">
          <div class="stat-cell-label">🌡 Feels Like</div>
          <div class="stat-cell-val">${feelsLike}°</div>
          <div class="stat-cell-sub">${feelsDesc}</div>
        </div>
        <div class="stat-cell">
          <div class="stat-cell-label">☀️ UV Index</div>
          <div class="stat-cell-val">${Math.round(uv)}</div>
          <div class="stat-cell-sub">${uvLabel}</div>
        </div>
        <div class="stat-cell">
          <div class="stat-cell-label">🌊 Pressure</div>
          <div class="stat-cell-val">${Math.round(c.surface_pressure)}</div>
          <div class="stat-cell-sub">hPa</div>
        </div>
        <div class="stat-cell">
          <div class="stat-cell-label">🌧 Precip</div>
          <div class="stat-cell-val">${c.precipitation}</div>
          <div class="stat-cell-sub">mm this hour</div>
        </div>
      </div>
    </div>

    <!-- Precip probability bar chart -->
    <div class="card">
      <div class="card-header">☔ Precipitation chance · next 12h</div>
      <div class="precip-bar-wrap">
        <div class="precip-hours">${precipBars}</div>
      </div>
    </div>

    <div style="height:16px"></div>
  </div>`;
}

/* ═══════════════════════════════════════════════
   DECK MANAGEMENT
═══════════════════════════════════════════════ */
const deck = document.getElementById('deck');
const dots = document.getElementById('dots');

function rebuildDeck() {
  deck.innerHTML = '';
  dots.innerHTML = '';

  places.forEach((p, i) => {
    const slide = document.createElement('div');
    slide.className = 'slide';
    slide.id = `slide-${i}`;
    slide.innerHTML = `<div class="loading-center"><div class="spin"></div><div style="font-size:15px;margin-top:8px">${p.name}</div></div>`;
    deck.appendChild(slide);

    const dot = document.createElement('div');
    dot.className = `dot${p.isDefault?' my-loc':''}${i===currentIdx?' active':''}`;
    dot.addEventListener('click', () => goTo(i));
    dots.appendChild(dot);
  });

  goTo(currentIdx, false);
  places.forEach((p, i) => loadSlide(p, i));
}

async function loadSlide(place, idx) {
  const slide = document.getElementById(`slide-${idx}`);
  if (!slide) return;
  try {
    const data = await fetchWeather(place.lat, place.lon);
    place._data = data;
    slide.innerHTML = buildSlide(place, data);
    slide.querySelectorAll('.tb').forEach(btn => {
      btn.addEventListener('click', () => {
        globalUnit = btn.dataset.u;
        localStorage.setItem('wx_unit', globalUnit);
        updateUnitUI();
        reRenderCurrentSlide();
      });
    });
    if (idx === currentIdx) applyBg(data.current.weather_code, nowHour());
  } catch(e) {
    slide.innerHTML = `<div class="loading-center" style="color:rgba(255,100,100,0.8)">⚠️ Could not load<br>${place.name}</div>`;
  }
}

function goTo(idx, animate = true) {
  currentIdx = Math.max(0, Math.min(idx, places.length - 1));
  deck.style.transition = animate ? 'transform 0.45s cubic-bezier(0.4,0,0.2,1)' : 'none';
  deck.style.transform = `translateX(-${currentIdx * 100}vw)`;
  dots.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === currentIdx));
  const p = places[currentIdx];
  if (p && p._data) applyBg(p._data.current.weather_code, nowHour());
}

function reRenderCurrentSlide() {
  const p = places[currentIdx];
  if (!p || !p._data) return;
  const slide = document.getElementById(`slide-${currentIdx}`);
  slide.innerHTML = buildSlide(p, p._data);
  slide.querySelectorAll('.tb').forEach(btn => {
    btn.addEventListener('click', () => {
      globalUnit = btn.dataset.u;
      localStorage.setItem('wx_unit', globalUnit);
      updateUnitUI();
      reRenderCurrentSlide();
    });
  });
}

/* ═══════════════════════════════════════════════
   SWIPE GESTURES
═══════════════════════════════════════════════ */
deck.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  isDragging = false; dragDelta = 0;
  deck.style.transition = 'none';
}, {passive:true});

deck.addEventListener('touchmove', e => {
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;
  if (!isDragging && Math.abs(dy) > Math.abs(dx)) return;
  isDragging = true;
  dragDelta = dx;
  deck.style.transform = `translateX(calc(-${currentIdx * 100}vw + ${dx}px))`;
}, {passive:true});

deck.addEventListener('touchend', () => {
  if (!isDragging) return;
  if (dragDelta < -50) goTo(currentIdx + 1);
  else if (dragDelta > 50) goTo(currentIdx - 1);
  else goTo(currentIdx);
  isDragging = false;
});

/* ═══════════════════════════════════════════════
   LIST VIEW
═══════════════════════════════════════════════ */
const listView = document.getElementById('list-view');

document.getElementById('listBtn').addEventListener('click', openList);
document.getElementById('listDone').addEventListener('click', closeList);
function openList() {
  editing = false;
  renderPlacesList();
  listView.classList.add('open');
  updateUnitUI();
}
function closeList() {
  listView.classList.remove('open');
  rebuildDeck();
}

function renderPlacesList() {
  const container = document.getElementById('placesList');
  container.innerHTML = '';
  places.forEach((p, i) => {
    const [gc1, gc2] = PLACE_GRADIENTS[i % PLACE_GRADIENTS.length];
    const data = p._data;
    const temp = data ? `${fmt(data.current.temperature_2m, globalUnit)}°` : '—°';
    const hi = data ? `H:${fmt(data.daily.temperature_2m_max[0], globalUnit)}°` : '';
    const lo = data ? `L:${fmt(data.daily.temperature_2m_min[0], globalUnit)}°` : '';
    const cond = data ? getWmo(data.current.weather_code).l : 'Loading…';

    const card = document.createElement('div');
    card.className = `place-card${editing?' editing':''}`;
    card.style.setProperty('--gc1', gc1);
    card.style.setProperty('--gc2', gc2);
    card.innerHTML = `
      <div class="place-card-left">
        <div class="pc-city">${p.name}</div>
        <div class="pc-region">${p.isDefault ? 'Default' : (p.region || p.country || '')}</div>
        <div class="pc-cond">${cond}</div>
      </div>
      <div class="place-card-right">
        <div class="pc-temp">${temp}</div>
        <div class="pc-hilow">${hi} ${lo}</div>
      </div>
      ${!p.isDefault ? `<div class="pc-del" data-idx="${i}">✕</div>` : ''}
    `;

    card.addEventListener('click', (e) => {
      if (e.target.classList.contains('pc-del')) return;
      currentIdx = i;
      closeList();
    });

    const delBtn = card.querySelector('.pc-del');
    if (delBtn) {
      delBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        places.splice(i, 1);
        savePlaces();
        if (currentIdx >= places.length) currentIdx = places.length - 1;
        renderPlacesList();
      });
    }

    container.appendChild(card);
  });
}

document.getElementById('editBtn').addEventListener('click', () => {
  editing = !editing;
  document.getElementById('editBtn').textContent = editing ? 'Done' : 'Edit';
  renderPlacesList();
});

/* ═══════════════════════════════════════════════
   SEARCH
═══════════════════════════════════════════════ */
let searchTimeout;
const searchInput = document.getElementById('listSearch');
const searchResults = document.getElementById('searchResults');

searchInput.addEventListener('input', () => {
  clearTimeout(searchTimeout);
  const q = searchInput.value.trim();
  if (q.length < 2) { searchResults.style.display = 'none'; return; }
  searchResults.style.display = 'block';
  searchResults.innerHTML = '<div style="padding:14px 16px;opacity:0.6"><span class="spin"></span> Searching…</div>';
  searchTimeout = setTimeout(async () => {
    try {
      const results = await geocodeSearch(q);
      if (!results.length) {
        searchResults.innerHTML = '<div style="padding:14px 16px;opacity:0.6">No results found.</div>';
        return;
      }
      searchResults.innerHTML = results.map((r,i) =>
        `<div class="search-result-item" data-idx="${i}">
          <div>
            <div class="sri-name">${r.name}${r.admin1?', '+r.admin1:''}</div>
            <div class="sri-region">${r.country || ''}</div>
          </div>
          <div style="opacity:0.5;font-size:13px">+Add</div>
        </div>`
      ).join('');
      searchResults.querySelectorAll('.search-result-item').forEach((el, i) => {
        el.addEventListener('click', () => addPlace(results[i]));
      });
    } catch {
      searchResults.innerHTML = '<div style="padding:14px 16px;opacity:0.6">Search failed.</div>';
    }
  }, 400);
});

async function addPlace(r) {
  const already = places.find(p => Math.abs(p.lat - r.latitude) < 0.05 && Math.abs(p.lon - r.longitude) < 0.05);
  if (already) { searchInput.value = ''; searchResults.style.display = 'none'; return; }
  const newPlace = {
    id: `${r.name}-${Date.now()}`,
    name: r.name,
    region: r.admin1 || '',
    country: r.country_code || '',
    lat: r.latitude,
    lon: r.longitude,
  };
  places.push(newPlace);
  savePlaces();
  searchInput.value = '';
  searchResults.style.display = 'none';
  // Load data in background
  try {
    const data = await fetchWeather(newPlace.lat, newPlace.lon);
    newPlace._data = data;
  } catch {}
  renderPlacesList();
}

function savePlaces() {
  const toSave = places.map(p => ({ id:p.id, name:p.name, region:p.region, country:p.country, lat:p.lat, lon:p.lon, isDefault:p.isDefault }));
  localStorage.setItem('wx_places', JSON.stringify(toSave));
}

/* ═══════════════════════════════════════════════
   UNIT TOGGLE
═══════════════════════════════════════════════ */
function updateUnitUI() {
  document.getElementById('globalC').classList.toggle('active', globalUnit === 'C');
  document.getElementById('globalF').classList.toggle('active', globalUnit === 'F');
}
document.getElementById('globalC').addEventListener('click', () => { globalUnit = 'C'; localStorage.setItem('wx_unit','C'); updateUnitUI(); renderPlacesList(); reRenderCurrentSlide(); });
document.getElementById('globalF').addEventListener('click', () => { globalUnit = 'F'; localStorage.setItem('wx_unit','F'); updateUnitUI(); renderPlacesList(); reRenderCurrentSlide(); });

/* ═══════════════════════════════════════════════
   GPS BUTTON
═══════════════════════════════════════════════ */
document.getElementById('mapBtn').addEventListener('click', () => {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(async pos => {
    const { latitude: lat, longitude: lon } = pos.coords;
    try {
      const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
      const d = await r.json();
      const city = d.address.city || d.address.town || d.address.village || 'My Location';
      const country = d.address.country_code?.toUpperCase() || '';
      const already = places.find(p => Math.abs(p.lat - lat) < 0.1 && Math.abs(p.lon - lon) < 0.1);
      if (!already) {
        const np = { id: 'gps-loc', name: city, region: d.address.state || '', country, lat, lon };
        places.unshift(np);
        savePlaces();
        currentIdx = 0;
        rebuildDeck();
      } else {
        currentIdx = places.indexOf(already);
        goTo(currentIdx);
      }
    } catch {}
  });
});

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
updateUnitUI();
rebuildDeck();

// Register service worker for PWA / offline support
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
